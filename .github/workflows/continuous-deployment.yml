name: Continuous Integration and Delivery Github

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build application .jar
      working-directory: ./
      run: mvn clean package

    - name: Docker Compose Build
      working-directory: ./
      run: docker compose build

    - name: Push to Docker Hub Container Registry
      working-directory: ./
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/springboot-dockerization:latest ${{ secrets.DOCKER_USERNAME }}/springboot-dockerization:${{ github.run_id }}
        docker push ${{ secrets.DOCKER_USERNAME }}/springboot-dockerization:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/springboot-dockerization:${{ github.run_id }}
