services:
  db:
    image: mysql:8.3.0
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: docker
      MYSQL_DATABASE: docker_from_zero_to_mastery_java
    ports:
      - 3306:3306
    networks:
      - k1meira-network

  springboot-dockerization:
    build: .
    image: k1meira/springboot-dockerization
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/docker_from_zero_to_mastery_java?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: docker
    ports:
      - 8181:8181
    depends_on:
      db:
        condition: service_healthy
    networks:
      - k1meira-network

networks:
  k1meira-network:
    driver: bridge